server:
  port: ${XNLp_PORT:8760}

spring:
  application:
    name: xnlp-server
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:llama3}
        enabled: ${OLLAMA_ENABLED:false}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        model: ${OPENAI_MODEL:gpt-4o}
        enabled: ${OPENAI_ENABLED:false}

management:
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:dev}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  file:
    path: ${LOG_PATH:/var/log/xnlp}

xnlp:
  server:
    host: 0.0.0.0
    port: 8760
    max-workers: 4
    request-timeout-seconds: 60
    max-batch-size: 32
  models:
    - name: ollama-default
      version: latest
      model-path: llama3
      backend: ollama
      device: cpu
      max-input-length: 4096
      max-output-length: 2048
